name: Build Windows Executable

on:
  workflow_dispatch:   # manual trigger only — run from the Actions tab

env:
  # Paste your Google Drive folder ID here (the long string in the folder URL).
  # The folder must be shared as "Anyone with the link can view".
  # Example URL: https://drive.google.com/drive/folders/1AbCdEfGhIjKlMnOpQrStUvWxYz
  #                                                      ^^^^^^^^^^^^^^^^^^^^^^^^^^^
  GDRIVE_FOLDER_ID: "PASTE_YOUR_FOLDER_ID_HERE"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller gdown

      - name: Download models from Google Drive
        run: >
          python -m gdown --folder
          "https://drive.google.com/drive/folders/${{ env.GDRIVE_FOLDER_ID }}"
          -O models --remaining-ok

      - name: Verify models downloaded
        run: dir models

      - name: Build with PyInstaller
        run: pyinstaller RoadSight.spec --clean --noconfirm

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: RoadSight-Windows
          path: dist\RoadSight\
          retention-days: 30
